; =============================================================================
; SQL Server 2012 Developer - "test" role (reporting / secondary)
; =============================================================================
; Used by: dev-test and test-test EC2 instances in AWS.
;          Mirrors the on-prem prod "test" instance (which is the *reporting*
;          DB - the name "test" is prod's naming, separate from the AWS test env).
;
; Run via: Install-SqlServer.ps1 (which calls setup.exe with this file)
;
; SQL Server 2012 schema notes (vs. modern setup.exe):
;   The 2012 setup.exe does NOT accept these parameters - they were added later:
;     - IACCEPTPYTHONLICENSETERMS / IACCEPTROPENLICENSETERMS  (2017+)
;     - SUPPRESSPRIVACYSTATEMENTNOTICE / SUPPRESSPAIDEDITIONNOTICE  (2017+)
;     - SQLSVCINSTANTFILEINIT  (2014+)
;     - SQLTEMPDBFILECOUNT / SQLTEMPDBFILESIZE / SQLTEMPDBFILEGROWTH /
;       SQLTEMPDBDIR / SQLTEMPDBLOGDIR / SQLTEMPDBLOGFILESIZE /
;       SQLTEMPDBLOGFILEGROWTH  (2016+)
;     - SQLTELSVCACCT / SQLTELSVCSTARTUPTYPE  (2016+)
;     - SQLMAXMEMORY / SQLMINMEMORY / SQLMAXDOP  (2019+)
;
;   Settings normally configured at install time on newer versions get applied
;   POST-install on 2012 by Apply-SqlBaseline.ps1 (sp_configure for memory/MAXDOP,
;   T-SQL ALTER DATABASE for tempdb files, GPO/manual for instant file init).
;
; OS target: Windows Server 2016. Also supports 2019 but NOT 2022
;            (SQL 2012 setup.exe does not support Windows Server 2022).
;
; Two-stage install:
;   1. THIS FILE drives the install.
;   2. After install, Apply-SqlBaseline.ps1 applies sp_configure / trace flags /
;      DB Mail mode, AND adds tempdb files (since 2012 setup can't).
;
; Database Mail safety: same as live - off by default after install,
; Apply-SqlBaseline keeps it off unless explicit override.
;
; Source baseline (Collation, LoginMode, FILESTREAMLEVEL):
;   infrastructure-baseline/<prod-test> (once captured) - the local-live
;   capture is from the OLTP role and may not match the reporting role.
; =============================================================================

[OPTIONS]

; ---------- Required for unattended install ----------
ACTION="Install"
IACCEPTSQLSERVERLICENSETERMS="True"
ENU="True"
QUIET="True"
QUIETSIMPLE="False"
UpdateEnabled="False"
USEMICROSOFTUPDATE="False"
ERRORREPORTING="False"

; ---------- Features ----------
; Match prod's reporting-instance feature set once inventory captures it.
FEATURES=SQLENGINE

; ---------- Instance identity ----------
; SQL 2012 = MSSQL11 directory naming.
INSTANCENAME="MSSQLSERVER"
INSTANCEID="MSSQLSERVER"
INSTANCEDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDWOWDIR="C:\Program Files (x86)\Microsoft SQL Server"

; ---------- Service accounts (virtual accounts - no password) ----------
; SQL 2012 supports virtual accounts (NT Service\...) on Windows Server 2008 R2+.
SQLSVCACCOUNT="NT Service\MSSQLSERVER"
SQLSVCSTARTUPTYPE="Automatic"

AGTSVCACCOUNT="NT Service\SQLSERVERAGENT"
AGTSVCSTARTUPTYPE="Automatic"

; ---------- Authentication & sysadmins ----------
; No SECURITYMODE = Windows Authentication only.
; Install-SqlServer.ps1 appends env-specific admin accounts at runtime.
SQLSYSADMINACCOUNTS="BUILTIN\Administrators"

; ---------- Collation ----------
SQLCOLLATION="Latin1_General_CI_AS"

; ---------- Network ----------
TCPENABLED="1"
NPENABLED="0"
BROWSERSVCSTARTUPTYPE="Disabled"

; ---------- Database file locations ----------
INSTALLSQLDATADIR="C:\Program Files\Microsoft SQL Server"
SQLBACKUPDIR="C:\Program Files\Microsoft SQL Server\MSSQL11.MSSQLSERVER\MSSQL\Backup"
SQLUSERDBDIR="C:\Program Files\Microsoft SQL Server\MSSQL11.MSSQLSERVER\MSSQL\DATA"
SQLUSERDBLOGDIR="C:\Program Files\Microsoft SQL Server\MSSQL11.MSSQLSERVER\MSSQL\DATA"

; ---------- TempDB ----------
; SQL 2012 setup creates one tempdb data file. Multi-file split is applied
; post-install by Apply-SqlBaseline.ps1 via T-SQL ALTER DATABASE.

; ---------- Other ----------
FILESTREAMLEVEL="0"
