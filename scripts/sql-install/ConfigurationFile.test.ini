; =============================================================================
; SQL Server 2019 Developer - "test" role (reporting / secondary)
; =============================================================================
; Used by: dev-test and test-test EC2 instances in AWS.
;          Mirrors the on-prem prod "test" instance (reporting DB).
;          Note: "test" is prod's instance name, not the AWS test environment.
;
; PoC note: prod's "test" role runs SQL Server 2012. This file uses SQL 2019
;   because the 2012 ISO is not readily available. When the 2012 ISO is sourced,
;   restore scripts/sql-install/archive/ConfigurationFile.test-sql2012.ini in
;   its place and update SqlInstall.Config.psd1 accordingly.
;
; Run via: Invoke-SqlInstall.ps1 (which calls setup.exe with this file)
;
; Two-stage install:
;   1. THIS FILE drives the install (features, instance name, paths, collation,
;      auth mode, tempdb layout, service startup types).
;   2. After install, scripts/inventory/Apply-SqlBaseline.ps1 applies the JSON
;      baseline captured from prod (sp_configure, trace flags, DB Mail mode).
;
; Database Mail safety:
;   - SQL Server installs with `Database Mail XPs` = 0 (disabled) by default.
;     A fresh install of this .ini cannot send email even if jobs try.
;   - Apply-SqlBaseline.ps1 defaults to -DbMailMode Disable to keep it off.
;     RedirectToLocal points at smtp4dev/MailHog for safe testing; Match is
;     intentionally not implemented to prevent accidental real email.
;
; OS target: Windows Server 2016.
;
; PoC trade-offs (revisit when scaling beyond t3.micro):
;   - SQLMAXMEMORY = 768 MB (1 GB t3.micro - leaves OS ~256 MB).
;   - SQLMAXDOP = 1 (single effective vCPU).
;
; TODO - align with prod before this becomes anything beyond a learning PoC:
;   This file was written from scratch to be "good enough" for a t3.micro dev
;   environment. It has NOT been validated against the actual prod install config.
;   Before using this pipeline for anything real, run Inventory-SqlServer.ps1
;   against the prod "test" (reporting) instance, compare its output to what is
;   set here, and reconcile any differences.
;
; Source baseline (Collation, LoginMode, FILESTREAMLEVEL):
;   infrastructure-baseline/<prod-test> (once captured).
; =============================================================================

[OPTIONS]

; ---------- Required for unattended install ----------
ACTION="Install"
IACCEPTSQLSERVERLICENSETERMS="True"
IACCEPTPYTHONLICENSETERMS="False"
IACCEPTROPENLICENSETERMS="False"
SUPPRESSPRIVACYSTATEMENTNOTICE="True"
SUPPRESSPAIDEDITIONNOTICE="True"
ENU="True"
QUIET="True"
QUIETSIMPLE="False"
UpdateEnabled="False"
USEMICROSOFTUPDATE="False"
ERRORREPORTING="False"

; ---------- Features ----------
; Match prod's reporting-instance feature set once inventory captures it.
FEATURES=SQLENGINE

; ---------- Instance identity ----------
; SQL 2019 = MSSQL15 directory naming.
INSTANCENAME="MSSQLSERVER"
INSTANCEID="MSSQLSERVER"
INSTANCEDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDWOWDIR="C:\Program Files (x86)\Microsoft SQL Server"

; ---------- Service accounts (virtual accounts - no password) ----------
SQLSVCACCOUNT="NT Service\MSSQLSERVER"
SQLSVCSTARTUPTYPE="Automatic"
SQLSVCINSTANTFILEINIT="True"

AGTSVCACCOUNT="NT Service\SQLSERVERAGENT"
AGTSVCSTARTUPTYPE="Automatic"

SQLTELSVCACCT="NT Service\SQLTELEMETRY"
SQLTELSVCSTARTUPTYPE="Automatic"

; ---------- Authentication & sysadmins ----------
; No SECURITYMODE = Windows Authentication only.
; sqlautomation is in BUILTIN\Administrators (added by Bootstrap-WinRMHttps.ps1)
; so it gets sysadmin access via group membership.
SQLSYSADMINACCOUNTS="BUILTIN\Administrators"

; ---------- Collation ----------
SQLCOLLATION="Latin1_General_CI_AS"

; ---------- Network ----------
; TCP on; Named Pipes off; Browser disabled (using static port 1433).
TCPENABLED="1"
NPENABLED="0"
BROWSERSVCSTARTUPTYPE="Disabled"

; ---------- Database file locations ----------
; F: = SQLDATA (20 GiB EBS, formatted by Invoke-HostPrep.ps1)
; G: = SQLLOG  (10 GiB EBS, formatted by Invoke-HostPrep.ps1)
; setup.exe creates subdirectories automatically.
INSTALLSQLDATADIR="C:\Program Files\Microsoft SQL Server"
SQLBACKUPDIR="F:\MSSQL\Backup"
SQLUSERDBDIR="F:\MSSQL\Data"
SQLUSERDBLOGDIR="G:\MSSQL\Log"

; ---------- TempDB (best-practice multi-file even on small box) ----------
SQLTEMPDBDIR="F:\MSSQL\TempDB"
SQLTEMPDBLOGDIR="G:\MSSQL\TempDB"
SQLTEMPDBFILECOUNT="4"
SQLTEMPDBFILESIZE="8"
SQLTEMPDBFILEGROWTH="64"
SQLTEMPDBLOGFILESIZE="8"
SQLTEMPDBLOGFILEGROWTH="64"

; ---------- Memory & parallelism ----------
; t3.micro has 1 GB RAM. Cap SQL at 768 MB to leave ~256 MB for the OS.
; MAXDOP=1 matches the single effective vCPU.
; Apply-SqlBaseline.ps1 will re-apply these from the prod snapshot, but setting
; them here means SQL starts correctly even before the baseline runs.
SQLMAXMEMORY="768"
SQLMINMEMORY="0"
SQLMAXDOP="1"

; ---------- Other ----------
; Enable FILESTREAM only if prod uses it (FILESTREAMLEVEL > 0 in prod baseline).
FILESTREAMLEVEL="0"
